<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大数据虚拟直播间 - 学科模拟学习平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background-color: #f5f7fa;
            color: #333;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            position: relative;
            text-align: center;
            margin-bottom: 40px;
            padding: 40px 20px;
            background: linear-gradient(135deg, #3a506b, #1c2541);
            color: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .user-info {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .user-info span {
            font-size: 14px;
        }
        
        .login-btn, .logout-btn, .back-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .login-btn {
            background: #3498db;
            color: white;
        }
        
        .login-btn:hover {
            background: #2980b9;
        }
        
        .logout-btn {
            background: #e74c3c;
            color: white;
        }
        
        .logout-btn:hover {
            background: #c0392b;
        }
        
        .back-btn {
            background: #f39c12;
            color: white;
        }
        
        .back-btn:hover {
            background: #e67e22;
        }
        
        .role-badge {
            padding: 4px 8px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .role-student {
            background: #27ae60;
        }
        
        .role-teacher {
            background: #f39c12;
        }
        
        .role-admin {
            background: #e74c3c;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .subtitle {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .form-container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }
        
        .step {
            display: none;
        }
        
        .step.active {
            display: block;
        }
        
        .step-title {
            color: #3a506b;
            margin-bottom: 25px;
            font-size: 1.8em;
            border-bottom: 2px solid #3a506b;
            padding-bottom: 10px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #3a506b;
        }
        
        .form-group select,
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #2980b9, #3498db);
            transform: translateY(-2px);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #27ae60, #229954);
            color: white;
        }
        
        .btn-success:hover {
            background: linear-gradient(135deg, #229954, #27ae60);
            transform: translateY(-2px);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
        }
        
        .btn-danger:hover {
            background: linear-gradient(135deg, #c0392b, #e74c3c);
            transform: translateY(-2px);
        }
        
        .btn-outline {
            background: transparent;
            border: 1px solid #3498db;
            color: #3498db;
        }
        
        .btn-outline:hover {
            background: #3498db;
            color: white;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        
        .live-room {
            display: none;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }
        
        .live-room.active {
            display: block;
        }
        
        .live-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .live-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .live-stats {
            display: flex;
            gap: 20px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #3498db;
        }
        
        .stat-label {
            font-size: 0.9em;
            color: #666;
        }
        
        .live-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
            margin-bottom: 20px;
        }
        
        .camera-feed {
            background: #000;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            height: 500px;
        }
        
        #camera-stream {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .product-panel {
            background: #f9f9f9;
            border-radius: 10px;
            padding: 20px;
        }
        
        .product-list {
            margin-bottom: 20px;
        }
        
        .product-item {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .product-image {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 5px;
        }
        
        .product-info {
            flex: 1;
        }
        
        .product-name {
            font-weight: 500;
            margin-bottom: 5px;
        }
        
        .product-price {
            color: #e74c3c;
            font-weight: bold;
        }
        
        .add-product-btn {
            width: 100%;
            margin-bottom: 20px;
        }
        
        .chat-panel {
            background: #f9f9f9;
            border-radius: 10px;
            padding: 20px;
            height: 300px;
            overflow-y: auto;
        }
        
        .chat-message {
            margin-bottom: 10px;
            padding: 10px;
            background: white;
            border-radius: 8px;
        }
        
        .chat-user {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .order-notification {
            background: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #27ae60;
        }
        
        .live-controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }
        
        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            width: 90%;
            max-width: 600px;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-title {
            font-size: 1.5em;
            color: #3a506b;
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            color: #666;
        }
        
        .file-input {
            margin-bottom: 15px;
        }
        
        .file-input input[type="file"] {
            display: none;
        }
        
        .file-input label {
            display: inline-block;
            padding: 10px 20px;
            background: #3498db;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .file-input label:hover {
            background: #2980b9;
        }
        
        .preview-image {
            max-width: 100%;
            max-height: 200px;
            margin-top: 10px;
            border-radius: 5px;
        }
        
        .stats-container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            display: none;
        }
        
        .stats-container.active {
            display: block;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .stat-card {
            background: #f9f9f9;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-card h3 {
            color: #3a506b;
            margin-bottom: 10px;
        }
        
        .stat-card .value {
            font-size: 2em;
            font-weight: bold;
            color: #3498db;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            header {
                padding: 30px 10px;
            }
            
            h1 {
                font-size: 2em;
            }
            
            .form-container,
            .live-room,
            .stats-container {
                padding: 20px;
            }
            
            .live-content {
                grid-template-columns: 1fr;
            }
            
            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="user-info" id="user-info">
                <button class="back-btn" onclick="window.location.href='index.html'">返回首页</button>
            </div>
            <h1>大数据虚拟直播间</h1>
            <p class="subtitle">模拟电商运营，练习直播带货</p>
        </header>
        
        <!-- 直播间设置步骤 -->
        <div class="form-container">
            <!-- 步骤 1: 直播间类型选择 -->
            <div class="step active" id="step-1">
                <h2 class="step-title">步骤 1: 选择直播间类型</h2>
                
                <div class="form-group">
                    <label for="live-type">直播间类型</label>
                    <select id="live-type">
                        <option value="">请选择直播间类型</option>
                        <option value="fashion">时尚服饰</option>
                        <option value="beauty">美妆护肤</option>
                        <option value="electronics">数码电子</option>
                        <option value="food">美食生鲜</option>
                        <option value="home">家居生活</option>
                        <option value="other">其他类型</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="product-category">商品类别</label>
                    <select id="product-category">
                        <option value="">请选择商品类别</option>
                        <option value="clothing">服装</option>
                        <option value="shoes">鞋靴</option>
                        <option value="bags">箱包</option>
                        <option value="cosmetics">化妆品</option>
                        <option value="electronics">电子产品</option>
                        <option value="food">食品</option>
                        <option value="home">家居用品</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="live-title">直播标题</label>
                    <input type="text" id="live-title" placeholder="请输入直播标题">
                </div>
                
                <div class="form-group">
                    <label for="live-description">直播描述</label>
                    <textarea id="live-description" placeholder="请输入直播描述"></textarea>
                </div>
                
                <div class="button-group">
                    <button class="btn btn-primary" onclick="nextStep(1)">下一步</button>
                </div>
            </div>
            
            <!-- 步骤 2: 虚拟背景设置 -->
            <div class="step" id="step-2">
                <h2 class="step-title">步骤 2: 设置虚拟背景</h2>
                
                <div class="form-group">
                    <label>选择背景类型</label>
                    <div style="display: flex; gap: 15px; margin-top: 10px;">
                        <label style="display: flex; align-items: center; gap: 5px;">
                            <input type="radio" name="background-type" value="default" checked>
                            默认背景
                        </label>
                        <label style="display: flex; align-items: center; gap: 5px;">
                            <input type="radio" name="background-type" value="custom">
                            自定义背景
                        </label>
                    </div>
                </div>
                
                <div class="form-group" id="custom-background-container" style="display: none;">
                    <label for="background-image">上传背景图片</label>
                    <div class="file-input">
                        <input type="file" id="background-image" accept="image/*">
                        <label for="background-image">选择图片</label>
                    </div>
                    <img id="background-preview" class="preview-image" src="" alt="背景预览" style="display: none;">
                </div>
                
                <div class="button-group">
                    <button class="btn btn-outline" onclick="prevStep(2)">上一步</button>
                    <button class="btn btn-primary" onclick="nextStep(2)">下一步</button>
                </div>
            </div>
            
            <!-- 步骤 3: 商品设置 -->
            <div class="step" id="step-3">
                <h2 class="step-title">步骤 3: 添加商品</h2>
                
                <div id="product-list">
                    <p class="alert alert-info">请添加至少一件商品</p>
                </div>
                
                <button class="btn btn-success add-product-btn" onclick="openAddProductModal()">添加商品</button>
                
                <div class="button-group">
                    <button class="btn btn-outline" onclick="prevStep(3)">上一步</button>
                    <button class="btn btn-primary" onclick="startLive()">开始直播</button>
                </div>
            </div>
        </div>
        
        <!-- 直播界面 -->
        <div class="live-room" id="live-room">
            <div class="live-header">
                <div class="live-info">
                    <h2 id="live-room-title">直播标题</h2>
                    <span id="live-status" style="background: #e74c3c; color: white; padding: 5px 10px; border-radius: 15px; font-size: 12px;">直播中</span>
                </div>
                <div class="live-stats">
                    <div class="stat-item">
                        <div class="stat-value" id="viewer-count">0</div>
                        <div class="stat-label">观看人数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="like-count">0</div>
                        <div class="stat-label">点赞数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="order-count">0</div>
                        <div class="stat-label">订单数</div>
                    </div>
                </div>
            </div>
            
            <div class="live-content">
                <div class="camera-feed">
                    <video id="camera-stream" autoplay></video>
                </div>
                <div>
                    <div class="product-panel">
                        <h3>商品列表</h3>
                        <div id="live-product-list">
                            <!-- 商品列表将在这里显示 -->
                        </div>
                    </div>
                    <div class="chat-panel" id="chat-panel">
                        <h3>观众评论</h3>
                        <!-- 评论将在这里显示 -->
                    </div>
                </div>
            </div>
            
            <div class="live-controls">
                <button class="btn btn-outline" onclick="toggleMicrophone()">
                    <span id="mic-status">麦克风: 开启</span>
                </button>
                <button class="btn btn-danger" onclick="endLive()">结束直播</button>
            </div>
        </div>
        
        <!-- 直播数据统计 -->
        <div class="stats-container" id="stats-container">
            <h2 class="step-title">直播数据统计</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>观看人数</h3>
                    <div class="value" id="total-viewers">0</div>
                </div>
                <div class="stat-card">
                    <h3>最高在线</h3>
                    <div class="value" id="peak-viewers">0</div>
                </div>
                <div class="stat-card">
                    <h3>点赞数</h3>
                    <div class="value" id="total-likes">0</div>
                </div>
                <div class="stat-card">
                    <h3>订单数</h3>
                    <div class="value" id="total-orders">0</div>
                </div>
                <div class="stat-card">
                    <h3>直播时长</h3>
                    <div class="value" id="live-duration">00:00</div>
                </div>
                <div class="stat-card">
                    <h3>转化率</h3>
                    <div class="value" id="conversion-rate">0%</div>
                </div>
            </div>
            <div class="button-group" style="justify-content: center; margin-top: 30px;">
                <button class="btn btn-primary" onclick="startNewLive()">开始新直播</button>
                <button class="btn btn-outline" onclick="window.location.href='index.html'">返回首页</button>
            </div>
        </div>
    </div>
    
    <!-- 添加商品模态框 -->
    <div class="modal" id="add-product-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">添加商品</h2>
                <button class="close-btn" onclick="closeAddProductModal()">&times;</button>
            </div>
            <div class="form-group">
                <label for="product-name">商品名称</label>
                <input type="text" id="product-name" placeholder="请输入商品名称">
            </div>
            <div class="form-group">
                <label for="product-price">商品价格</label>
                <input type="number" id="product-price" placeholder="请输入商品价格" min="0" step="0.01">
            </div>
            <div class="form-group">
                <label for="product-description">商品描述</label>
                <textarea id="product-description" placeholder="请输入商品描述"></textarea>
            </div>
            <div class="form-group">
                <label for="product-image">商品图片</label>
                <div class="file-input">
                    <input type="file" id="product-image" accept="image/*">
                    <label for="product-image">选择图片</label>
                </div>
                <img id="product-preview" class="preview-image" src="" alt="商品预览" style="display: none;">
            </div>
            <div class="button-group">
                <button class="btn btn-outline" onclick="closeAddProductModal()">取消</button>
                <button class="btn btn-primary" onclick="addProduct()">添加商品</button>
            </div>
        </div>
    </div>
    
    <script>
        let currentStep = 1;
        let products = [];
        let stream = null;
        let microphoneEnabled = true;
        let liveStartTime = null;
        let liveInterval = null;
        let stats = {
            viewers: 0,
            peakViewers: 0,
            likes: 0,
            orders: 0,
            duration: 0
        };
        
        // 检查登录状态
        function checkLoginStatus() {
            const user = localStorage.getItem('user');
            const userInfoElement = document.getElementById('user-info');
            
            if (user) {
                const userData = JSON.parse(user);
                let roleText = '';
                let roleClass = '';
                
                switch (userData.role) {
                    case 'student':
                        roleText = '学生';
                        roleClass = 'role-student';
                        break;
                    case 'teacher':
                        roleText = '教师';
                        roleClass = 'role-teacher';
                        break;
                    case 'admin':
                        roleText = '管理员';
                        roleClass = 'role-admin';
                        break;
                }
                
                userInfoElement.innerHTML = `
                    <span>欢迎, ${userData.username}</span>
                    <span class="role-badge ${roleClass}">${roleText}</span>
                    <button class="back-btn" onclick="window.location.href='index.html'">返回首页</button>
                    <button class="logout-btn" onclick="logout()">退出登录</button>
                `;
            }
        }
        
        // 退出登录
        function logout() {
            localStorage.removeItem('user');
            window.location.reload();
        }
        
        // 下一步
        function nextStep(step) {
            if (step === 1) {
                const liveType = document.getElementById('live-type').value;
                const productCategory = document.getElementById('product-category').value;
                const liveTitle = document.getElementById('live-title').value;
                
                if (!liveType || !productCategory || !liveTitle) {
                    alert('请填写所有必填项');
                    return;
                }
            }
            
            document.getElementById(`step-${step}`).classList.remove('active');
            document.getElementById(`step-${step + 1}`).classList.add('active');
            currentStep = step + 1;
        }
        
        // 上一步
        function prevStep(step) {
            document.getElementById(`step-${step}`).classList.remove('active');
            document.getElementById(`step-${step - 1}`).classList.add('active');
            currentStep = step - 1;
        }
        
        // 背景类型选择
        document.querySelectorAll('input[name="background-type"]').forEach(radio => {
            radio.addEventListener('change', function() {
                if (this.value === 'custom') {
                    document.getElementById('custom-background-container').style.display = 'block';
                } else {
                    document.getElementById('custom-background-container').style.display = 'none';
                }
            });
        });
        
        // 背景图片预览
        document.getElementById('background-image').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('background-preview');
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });
        
        // 商品图片预览
        document.getElementById('product-image').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('product-preview');
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });
        
        // 打开添加商品模态框
        function openAddProductModal() {
            document.getElementById('add-product-modal').classList.add('active');
        }
        
        // 关闭添加商品模态框
        function closeAddProductModal() {
            document.getElementById('add-product-modal').classList.remove('active');
            // 重置表单
            document.getElementById('product-name').value = '';
            document.getElementById('product-price').value = '';
            document.getElementById('product-description').value = '';
            document.getElementById('product-image').value = '';
            document.getElementById('product-preview').src = '';
            document.getElementById('product-preview').style.display = 'none';
        }
        
        // 添加商品
        function addProduct() {
            const name = document.getElementById('product-name').value;
            const price = document.getElementById('product-price').value;
            const description = document.getElementById('product-description').value;
            const imageInput = document.getElementById('product-image');
            
            if (!name || !price || !description) {
                alert('请填写所有必填项');
                return;
            }
            
            let image = 'https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=product%20placeholder%20image&image_size=square';
            if (imageInput.files.length > 0) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    image = e.target.result;
                    addProductToLocal(name, price, description, image);
                };
                reader.readAsDataURL(imageInput.files[0]);
            } else {
                addProductToLocal(name, price, description, image);
            }
        }
        
        // 添加商品到本地
        function addProductToLocal(name, price, description, image) {
            const product = {
                id: Date.now(),
                name: name,
                price: price,
                description: description,
                image: image
            };
            
            products.push(product);
            updateProductList();
            closeAddProductModal();
        }
        
        // 更新商品列表
        function updateProductList() {
            const productList = document.getElementById('product-list');
            
            if (products.length === 0) {
                productList.innerHTML = '<p class="alert alert-info">请添加至少一件商品</p>';
                return;
            }
            
            let html = '';
            products.forEach(product => {
                html += `
                    <div class="product-item">
                        <img src="${product.image}" alt="${product.name}" class="product-image">
                        <div class="product-info">
                            <div class="product-name">${product.name}</div>
                            <div class="product-price">¥${product.price}</div>
                        </div>
                        <button class="btn btn-danger" onclick="removeProduct(${product.id})">删除</button>
                    </div>
                `;
            });
            
            productList.innerHTML = html;
        }
        
        // 删除商品
        function removeProduct(id) {
            products = products.filter(product => product.id !== id);
            updateProductList();
        }
        
        // 开始直播
        function startLive() {
            if (products.length === 0) {
                alert('请至少添加一件商品');
                return;
            }
            
            // 调用摄像头
            navigator.mediaDevices.getUserMedia({ video: true, audio: true })
                .then(function(s) {
                    stream = s;
                    const video = document.getElementById('camera-stream');
                    video.srcObject = stream;
                    
                    // 显示直播界面
                    document.querySelector('.form-container').style.display = 'none';
                    document.getElementById('live-room').classList.add('active');
                    
                    // 设置直播标题
                    document.getElementById('live-room-title').textContent = document.getElementById('live-title').value;
                    
                    // 显示商品列表
                    updateLiveProductList();
                    
                    // 开始直播统计
                    startLiveStats();
                    
                    // 模拟观众评论
                    simulateComments();
                    
                    // 模拟订单
                    simulateOrders();
                })
                .catch(function(err) {
                    alert('无法访问摄像头或麦克风: ' + err.message);
                });
        }
        
        // 更新直播商品列表
        function updateLiveProductList() {
            const productList = document.getElementById('live-product-list');
            let html = '';
            
            products.forEach(product => {
                html += `
                    <div class="product-item">
                        <img src="${product.image}" alt="${product.name}" class="product-image">
                        <div class="product-info">
                            <div class="product-name">${product.name}</div>
                            <div class="product-price">¥${product.price}</div>
                        </div>
                    </div>
                `;
            });
            
            productList.innerHTML = html;
        }
        
        // 开始直播统计
        function startLiveStats() {
            liveStartTime = new Date();
            stats = {
                viewers: 0,
                peakViewers: 0,
                likes: 0,
                orders: 0,
                duration: 0
            };
            
            liveInterval = setInterval(function() {
                // 更新观看人数
                stats.viewers = Math.max(0, stats.viewers + Math.floor(Math.random() * 10) - 3);
                stats.peakViewers = Math.max(stats.peakViewers, stats.viewers);
                
                // 更新点赞数
                stats.likes += Math.floor(Math.random() * 5);
                
                // 更新时长
                stats.duration = Math.floor((new Date() - liveStartTime) / 1000);
                
                // 更新显示
                document.getElementById('viewer-count').textContent = stats.viewers;
                document.getElementById('like-count').textContent = stats.likes;
                document.getElementById('order-count').textContent = stats.orders;
            }, 1000);
        }
        
        // 模拟观众评论
        function simulateComments() {
            const comments = [
                '主播好漂亮！',
                '这个产品怎么样？',
                '价格能再优惠一点吗？',
                '什么时候发货？',
                '质量有保证吗？',
                '我已经下单了，期待收货！',
                '主播讲解得很详细，谢谢！',
                '这个颜色好看吗？',
                '有什么赠品吗？',
                '支持主播！'
            ];
            
            const usernames = ['用户123', '购物达人', '时尚先锋', '数码控', '美食爱好者'];
            
            setInterval(function() {
                if (Math.random() > 0.7) {
                    const comment = comments[Math.floor(Math.random() * comments.length)];
                    const username = usernames[Math.floor(Math.random() * usernames.length)];
                    
                    const chatPanel = document.getElementById('chat-panel');
                    const messageDiv = document.createElement('div');
                    messageDiv.className = 'chat-message';
                    messageDiv.innerHTML = `
                        <div class="chat-user">${username}</div>
                        <div class="chat-content">${comment}</div>
                    `;
                    chatPanel.appendChild(messageDiv);
                    chatPanel.scrollTop = chatPanel.scrollHeight;
                }
            }, 3000);
        }
        
        // 模拟订单
        function simulateOrders() {
            setInterval(function() {
                if (Math.random() > 0.85 && products.length > 0) {
                    const product = products[Math.floor(Math.random() * products.length)];
                    stats.orders++;
                    
                    const chatPanel = document.getElementById('chat-panel');
                    const orderDiv = document.createElement('div');
                    orderDiv.className = 'order-notification';
                    orderDiv.innerHTML = `
                        <strong>订单通知：</strong> 用户下单购买了 ${product.name}，价格 ¥${product.price}
                    `;
                    chatPanel.appendChild(orderDiv);
                    chatPanel.scrollTop = chatPanel.scrollHeight;
                    
                    document.getElementById('order-count').textContent = stats.orders;
                }
            }, 5000);
        }
        
        // 切换麦克风
        function toggleMicrophone() {
            microphoneEnabled = !microphoneEnabled;
            const audioTracks = stream.getAudioTracks();
            audioTracks.forEach(track => {
                track.enabled = microphoneEnabled;
            });
            document.getElementById('mic-status').textContent = `麦克风: ${microphoneEnabled ? '开启' : '关闭'}`;
        }
        
        // 结束直播
        function endLive() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            
            clearInterval(liveInterval);
            
            // 显示统计界面
            document.getElementById('live-room').classList.remove('active');
            document.getElementById('stats-container').classList.add('active');
            
            // 更新统计数据
            document.getElementById('total-viewers').textContent = stats.viewers;
            document.getElementById('peak-viewers').textContent = stats.peakViewers;
            document.getElementById('total-likes').textContent = stats.likes;
            document.getElementById('total-orders').textContent = stats.orders;
            
            // 格式化时长
            const minutes = Math.floor(stats.duration / 60);
            const seconds = stats.duration % 60;
            document.getElementById('live-duration').textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            // 计算转化率
            const conversionRate = stats.viewers > 0 ? Math.round((stats.orders / stats.viewers) * 100) : 0;
            document.getElementById('conversion-rate').textContent = `${conversionRate}%`;
        }
        
        // 开始新直播
        function startNewLive() {
            document.getElementById('stats-container').classList.remove('active');
            document.querySelector('.form-container').style.display = 'block';
            document.getElementById('step-1').classList.add('active');
            document.getElementById('step-2').classList.remove('active');
            document.getElementById('step-3').classList.remove('active');
            currentStep = 1;
            products = [];
            updateProductList();
        }
        
        // 页面加载时检查登录状态
        window.onload = function() {
            checkLoginStatus();
        };
    </script>
</body>
</html>
